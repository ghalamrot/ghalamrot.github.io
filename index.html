<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>قلمروستان</title>

    <meta name="description" content="قلمروستان - بازی استراتژیک آنلاین">

    <link rel="icon" href="assets/images/favicon.png">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- صفحه بارگذاری -->
    <div id="loading-screen">
        <h1>🏰 قلمروستان</h1>
        <p>در حال بارگذاری...</p>
    </div>

    <!-- رابط بازی -->
    <div id="game">

        <!-- نوار بالا -->
        <header id="top-bar">

            <div id="logo">
                🏰 قلمروستان
            </div>

            <div id="resource-bar">
                <span id="gold">💰 0</span>
                <span id="troops">👥 0</span>
                <span id="population">🏠 0</span>
            </div>

        </header>

        <!-- بخش اصلی -->
        <main id="game-area">

            <canvas id="game-canvas"></canvas>

        </main>

    </div>

    <!-- اسکریپت‌ها -->
    <script src="js/main.js"></script>

</body>

</html>
