<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مسابقه موبایل</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; touch-action: none; user-select: none; }
        
        #gameCanvas { width: 100vw; height: 100vh; display: block; }
        
        /* ===== پیام خطا ===== */
        #error-box {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            color: #ff6b6b;
            padding: 30px 40px;
            border-radius: 15px;
            border: 2px solid #ff6b6b;
            font-family: Arial, sans-serif;
            text-align: center;
            z-index: 100;
            max-width: 90%;
            display: none;
        }
        #error-box h2 { color: #ff6b6b; margin-bottom: 15px; }
        #error-box p { color: #ddd; font-size: 14px; line-height: 1.6; }
        #error-box .hint { color: #ffd93d; font-size: 13px; margin-top: 10px; }
        
        #controls {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 10;
            pointer-events: none;
        }
        .control-group { display: flex; gap: 15px; pointer-events: auto; }
        .ctrl-btn {
            width: 70px; height: 70px; border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.6);
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(5px);
            color: white;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }
        .ctrl-btn:active { transform: scale(0.85); background: rgba(255,255,255,0.3); }
        .ctrl-btn.wide { width: 100px; border-radius: 35px; font-size: 16px; }
        
        #speed-display {
            position: fixed;
            top: 15px;
            right: 15px;
            color: #00ff88;
            font-family: 'Courier New', monospace;
            font-size: 18px;
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            border-radius: 20px;
            z-index: 10;
        }
        #reset-btn {
            position: fixed;
            top: 15px;
            left: 15px;
            width: 44px; height: 44px;
            border-radius: 50%;
            background: rgba(255,50,50,0.3);
            border: 2px solid rgba(255,50,50,0.6);
            color: white;
            font-size: 20px;
            z-index: 10;
        }
        #loading-text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-family: Arial;
            font-size: 20px;
            z-index: 5;
            background: rgba(0,0,0,0.7);
            padding: 20px 40px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div id="loading-text">⏳ در حال بارگذاری ماشین...</div>
    <div id="error-box">
        <h2>❌ خطا در بارگذاری</h2>
        <p id="error-message">مشخص نشده</p>
        <p class="hint">💡 راه‌حل: فایل car.glb را در کنار این فایل قرار دهید</p>
        <p class="hint" style="margin-top:5px;">📁 ساختار: index.html و car.glb در یک پوشه</p>
    </div>

    <div id="speed-display">🚗 0 km/h</div>
    <button id="reset-btn">⟳</button>

    <div id="controls">
        <div class="control-group" id="left-group">
            <button class="ctrl-btn" id="btn-left">◀</button>
            <button class="ctrl-btn" id="btn-right">▶</button>
        </div>
        <div class="control-group" id="right-group">
            <button class="ctrl-btn wide" id="btn-gas">⚡ گاز</button>
            <button class="ctrl-btn" id="btn-brake">⏹</button>
        </div>
    </div>

    <!-- ===== کتابخانه‌ها ===== -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>

    <script>
        // ===== نمایش خطا =====
        function showError(message) {
            document.getElementById('loading-text').style.display = 'none';
            const box = document.getElementById('error-box');
            document.getElementById('error-message').textContent = message;
            box.style.display = 'block';
        }

        // ===== تنظیمات =====
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a2a3a);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        document.body.prepend(renderer.domElement);

        // ===== نور =====
        const ambientLight = new THREE.AmbientLight(0x406080, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(10, 25, 10);
        dirLight.castShadow = true;
        scene.add(dirLight);

        const hemiLight = new THREE.HemisphereLight(0x87CEEB, 0x2c3e50, 0.8);
        scene.add(hemiLight);

        // ===== زمین =====
        const groundGeometry = new THREE.PlaneGeometry(120, 120);
        const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x2a3a4a, roughness: 0.9 });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.5;
        ground.receiveShadow = true;
        scene.add(ground);

        // خطوط جاده
        for (let i = -55; i < 55; i += 4) {
            const lineGeo = new THREE.PlaneGeometry(0.2, 1.5);
            const lineMat = new THREE.MeshStandardMaterial({ color: 0x88aacc });
            const line = new THREE.Mesh(lineGeo, lineMat);
            line.rotation.x = -Math.PI / 2;
            line.position.set(i, -0.49, 0);
            scene.add(line);
        }

        // ===== فیزیک =====
        const world = new CANNON.World();
        world.gravity.set(0, -25, 0);
        world.broadphase = new CANNON.NaiveBroadphase();
        world.solver.iterations = 8;

        const groundBody = new CANNON.Body({ mass: 0 });
        groundBody.addShape(new CANNON.Plane());
        groundBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), -Math.PI / 2);
        world.addBody(groundBody);

        // ===== متغیرها =====
        let carMesh = null;
        let carBody = null;
        let speed = 0;
        const maxSpeed = 25;
        const acceleration = 12;
        const braking = 8;
        const turnSpeed = 2.8;
        const friction = 0.96;
        let carLoaded = false;

        // ===== تلاش برای بارگذاری ماشین =====
        console.log('🔍 شروع بارگذاری car.glb...');
        
        const loader = new THREE.GLTFLoader();
        
        // ⭐ روش اول: مسیر مستقیم
        loader.load('car.glb', 
            function(gltf) {
                // ✅ موفقیت
                console.log('✅ ماشین با موفقیت بارگذاری شد!');
                document.getElementById('loading-text').style.display = 'none';
                
                carMesh = gltf.scene;
                carMesh.scale.set(0.8, 0.8, 0.8);
                carMesh.castShadow = true;
                scene.add(carMesh);

                const boxShape = new CANNON.Box(new CANNON.Vec3(0.8, 0.25, 0.4));
                carBody = new CANNON.Body({ mass: 120 });
                carBody.addShape(boxShape);
                carBody.position.set(0, 0.5, 0);
                world.addBody(carBody);

                camera.position.set(0, 3.5, 6);
                carLoaded = true;
                
                if (navigator.vibrate) navigator.vibrate(50);
            },
            function(xhr) {
                // 📊 پیشرفت
                const progress = (xhr.loaded / xhr.total * 100).toFixed(0);
                console.log(`📊 بارگذاری: ${progress}%`);
                document.getElementById('loading-text').textContent = `⏳ بارگذاری ${progress}%`;
            },
            function(error) {
                // ❌ خطا
                console.error('❌ خطا:', error);
                
                // ⭐ روش دوم: تلاش با مسیر ./ 
                console.log('🔄 تلاش مجدد با مسیر ./car.glb');
                loader.load('./car.glb', 
                    function(gltf) {
                        console.log('✅ بارگذاری با مسیر ./ موفق بود!');
                        document.getElementById('loading-text').style.display = 'none';
                        carMesh = gltf.scene;
                        carMesh.scale.set(0.8, 0.8, 0.8);
                        scene.add(carMesh);
                        // ... بقیه کد
                    },
                    undefined,
                    function() {
                        // ❌ باز هم خطا
                        showError('فایل car.glb پیدا نشد!');
                    }
                );
            }
        );

        // ===== کنترل‌ها =====
        const touchState = { gas: false, brake: false, left: false, right: false };

        function setupTouchButton(id, stateKey) {
            const el = document.getElementById(id);
            if (!el) return;
            el.addEventListener('touchstart', (e) => { e.preventDefault(); touchState[stateKey] = true; }, { passive: false });
            el.addEventListener('touchend', (e) => { e.preventDefault(); touchState[stateKey] = false; }, { passive: false });
            el.addEventListener('touchcancel', () => { touchState[stateKey] = false; });
            el.addEventListener('mousedown', () => touchState[stateKey] = true);
            el.addEventListener('mouseup', () => touchState[stateKey] = false);
            el.addEventListener('mouseleave', () => touchState[stateKey] = false);
        }

        setupTouchButton('btn-gas', 'gas');
        setupTouchButton('btn-brake', 'brake');
        setupTouchButton('btn-left', 'left');
        setupTouchButton('btn-right', 'right');

        document.getElementById('reset-btn').addEventListener('click', resetCar);
        document.getElementById('reset-btn').addEventListener('touchstart', (e) => { e.preventDefault(); resetCar(); });

        function resetCar() {
            if (carBody) {
                carBody.position.set(0, 0.5, 0);
                carBody.velocity.set(0, 0, 0);
                carBody.angularVelocity.set(0, 0, 0);
                carBody.quaternion.set(0, 0, 0, 1);
                speed = 0;
                if (navigator.vibrate) navigator.vibrate(30);
            }
        }

        // ===== حلقه بازی =====
        let lastTime = 0;

        function animate(time) {
            requestAnimationFrame(animate);
            
            let delta = Math.min((time - lastTime) / 1000, 0.05);
            lastTime = time;

            if (carBody && carMesh && carLoaded) {
                const forward = new CANNON.Vec3(0, 0, -1);
                forward.applyQuaternion(carBody.quaternion);

                if (touchState.gas) {
                    speed += acceleration * delta;
                    if (speed > maxSpeed) speed = maxSpeed;
                }
                
                if (touchState.brake) {
                    speed -= braking * delta;
                    if (speed < -maxSpeed/2) speed = -maxSpeed/2;
                }

                if (!touchState.gas && !touchState.brake) {
                    speed *= (1 - delta * 2);
                    if (Math.abs(speed) < 0.1) speed = 0;
                }

                if (Math.abs(speed) > 0.1) {
                    carBody.velocity.x = forward.x * speed;
                    carBody.velocity.z = forward.z * speed;
                } else {
                    carBody.velocity.x = 0;
                    carBody.velocity.z = 0;
                }

                if (Math.abs(speed) > 0.5) {
                    const turn = turnSpeed * (speed / maxSpeed) * 1.2;
                    if (touchState.left) carBody.angularVelocity.y = turn;
                    else if (touchState.right) carBody.angularVelocity.y = -turn;
                    else carBody.angularVelocity.y *= 0.9;
                } else {
                    carBody.angularVelocity.y *= 0.9;
                }

                carBody.angularVelocity.y = Math.max(-3, Math.min(3, carBody.angularVelocity.y));

                carMesh.position.copy(carBody.position);
                carMesh.position.y += 0.2;
                carMesh.quaternion.copy(carBody.quaternion);

                const camOffset = new THREE.Vector3(0, 2.8, 5.5);
                camOffset.applyQuaternion(carMesh.quaternion);
                const targetPos = carMesh.position.clone().add(camOffset);
                camera.position.lerp(targetPos, 0.08);
                camera.lookAt(carMesh.position);

                const speedKmh = Math.abs(speed * 3.6).toFixed(0);
                document.getElementById('speed-display').textContent = `🚗 ${speedKmh} km/h`;
            }

            world.step(1/60, delta, 3);
            renderer.render(scene, camera);
        }

        animate(0);

        // ===== ریسایز =====
        function resize() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
        }
        window.addEventListener('resize', resize);
        window.addEventListener('orientationchange', () => setTimeout(resize, 300));
        document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
    </script>
</body>
</html>
